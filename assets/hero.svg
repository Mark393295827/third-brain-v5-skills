    <path d="M59 82C47 70 48 51 61 39C73 28 92 28 104 40C116 52 116 70 103 82C96 89 94 95 94 103H68C68 95 66 89 59 82Z" stroke="#FDE68A" stroke-width="5" stroke-linejoin="round"/>
