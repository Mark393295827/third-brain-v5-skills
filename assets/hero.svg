<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI-Powered Third Brain V5</title>
  <desc id="desc">A minimalist dark technology hero image showing a flywheel from human brain to LLM Wiki to creative output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B18"/>
      <stop offset="0.46" stop-color="#121B3E"/>
      <stop offset="1" stop-color="#25134A"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(366 300) rotate(90) scale(230)">
      <stop stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 300) rotate(90) scale(260)">
      <stop stop-color="#8B5CF6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(914 300) rotate(90) scale(220)">
      <stop stop-color="#F59E0B" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111A31" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#15122A" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="stroke" x1="220" y1="180" x2="1060" y2="424" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.46"/>
    </filter>
    <filter id="iconGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="30" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" rx="30" fill="url(#glowViolet)"/>
  <rect width="1280" height="640" rx="30" fill="url(#glowGold)"/>

  <g opacity="0.16">
    <path d="M0 126H1280M0 254H1280M0 382H1280M0 510H1280" stroke="#94A3B8"/>
    <path d="M160 0V640M320 0V640M480 0V640M640 0V640M800 0V640M960 0V640M1120 0V640" stroke="#94A3B8"/>
  </g>

  <text x="640" y="86" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="0">
    AI-Powered Third Brain V5
  </text>
  <text x="640" y="128" text-anchor="middle" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="650" letter-spacing="0">
    Human Brain x LLM Wiki x Behavior Redesign
  </text>
  <text x="640" y="164" text-anchor="middle" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="450" letter-spacing="0">
    Turns knowledge from saved into executed, amplified value
  </text>

