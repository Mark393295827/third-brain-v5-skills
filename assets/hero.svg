    <path d="M109 102H136M136 102L124 90M136 102L124 114" stroke="#FDBA74" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="174" text-anchor="middle" fill="#FEF3C7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Creative Output</text>
  </g>

  <g>
    <text x="640" y="488" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650">
      Input -> Cognitive OS -> Behavior -> Creativity -> Iteration
    </text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <g transform="translate(175 522)">
      <rect width="210" height="54" rx="14" fill="url(#card)" stroke="#38BDF8" stroke-opacity="0.46"/>
      <text x="105" y="34" text-anchor="middle" fill="#E0F2FE">Knowledge Input</text>
    </g>
    <g transform="translate(407 522)">
      <rect width="210" height="54" rx="14" fill="url(#card)" stroke="#8B5CF6" stroke-opacity="0.5"/>
      <text x="105" y="34" text-anchor="middle" fill="#EDE9FE">Cognitive Compile</text>
    </g>
    <g transform="translate(639 522)">
      <rect width="210" height="54" rx="14" fill="url(#card)" stroke="#22C55E" stroke-opacity="0.46"/>
      <text x="105" y="34" text-anchor="middle" fill="#DCFCE7">Behavior Redesign</text>
    </g>
    <g transform="translate(871 522)">
      <rect width="210" height="54" rx="14" fill="url(#card)" stroke="#F59E0B" stroke-opacity="0.54"/>
      <text x="105" y="34" text-anchor="middle" fill="#FEF3C7">Creative Compounding</text>
