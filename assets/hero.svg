  <path d="M367 302C419 222 517 198 590 240" stroke="url(#stroke)" stroke-width="3" stroke-linecap="round" opacity="0.86"/>
  <path d="M913 302C861 382 763 406 690 364" stroke="url(#stroke)" stroke-width="3" stroke-linecap="round" opacity="0.86"/>
  <path d="M584 222L615 256L569 259" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M696 382L665 348L711 345" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

