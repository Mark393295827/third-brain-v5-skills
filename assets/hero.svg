    <path d="M54 99C39 96 30 84 31 69C32 55 43 45 57 45C61 30 77 23 92 29C105 34 111 46 109 59C121 64 128 76 125 90C122 105 109 115 94 115H64C58 115 52 112 49 106" stroke="#BAE6FD" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M58 48V112M82 29V115M105 60C94 61 88 68 87 81M55 70C68 70 75 78 76 91" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
    <circle cx="56" cy="48" r="4" fill="#7DD3FC"/>
    <circle cx="82" cy="29" r="4" fill="#7DD3FC"/>
    <circle cx="105" cy="60" r="4" fill="#7DD3FC"/>
    <text x="80" y="174" text-anchor="middle" fill="#E0F2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Human Brain</text>
  </g>

  <g transform="translate(544 244)" filter="url(#iconGlow)">
    <circle cx="96" cy="80" r="76" fill="#2E1065" fill-opacity="0.56" stroke="#A78BFA" stroke-opacity="0.84"/>
    <rect x="48" y="38" width="96" height="84" rx="14" fill="#111827" fill-opacity="0.64" stroke="#C4B5FD" stroke-width="4"/>
    <path d="M74 58H118M74 80H118M74 102H104" stroke="#DDD6FE" stroke-width="5" stroke-linecap="round"/>
    <path d="M48 58C30 60 22 72 22 84C22 102 38 116 58 116M144 58C162 60 170 72 170 84C170 102 154 116 134 116" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
    <text x="96" y="174" text-anchor="middle" fill="#EDE9FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">LLM Wiki</text>
    <text x="96" y="198" text-anchor="middle" fill="#C4B5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">Knowledge OS</text>
  </g>

  <g transform="translate(874 244)" filter="url(#iconGlow)">
